version: "3.8"

services:
  influxdb:
    image: influxdb:2
    ports:
      - "8086:8086"
    volumes:
      - influxdb-data:/var/lib/influxdb2
    environment:
      - DOCKER_INFLUXDB_INIT_USERNAME=admin
      - DOCKER_INFLUXDB_INIT_PASSWORD=admin123
      - DOCKER_INFLUXDB_INIT_ORG=tablet-org
      - DOCKER_INFLUXDB_INIT_BUCKET=tablet-bucket
      - DOCKER_INFLUXDB_INIT_ADMIN_TOKEN=bm8Efbl-EZaDyvIv6JOxJ6YUH9VKgcJhHBnFabRFPYKXocq2Yc9al-svsRJwYC4aW82Glr5EvhDn4GL4BKu3gg==

  grafana:
    image: grafana/grafana
    ports:
      - "3000:3000"

volumes:
  influxdb-data: