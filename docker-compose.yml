version: "3.8"

services:
  influxdb:
    image: influxdb:2
    ports:
      - "8086:8086"
    volumes:
      - influxdb-data:/var/lib/influxdb2
    environment:
      - DOCKER_INFLUXDB_INIT_USERNAME=admin
      - DOCKER_INFLUXDB_INIT_PASSWORD=admin123
      - DOCKER_INFLUXDB_INIT_ORG=tablet-org
      - DOCKER_INFLUXDB_INIT_BUCKET=tablet-bucket
      - DOCKER_INFLUXDB_INIT_ADMIN_TOKEN=wKmGoYc_UR_4a27K6fXUHo24ATaZRhHP2TwVBNxEwl83urhGXWLhsY6kRJsJ62_6yxHE8lxQogQ33tjEsP3nGg==

  grafana:
    image: grafana/grafana
    ports:
      - "3000:3000"

volumes:
  influxdb-data: